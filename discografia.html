<!DOCTYPE html>
<html lang="es" data-theme="songs">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- DaisyUI & Tailwind -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- DaisyUI Themes -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
        <!-- Estilos Propios -->
        <link href="./css/styles.css" rel="stylesheet"> 
        <title>Adrianne Lenker</title>

    </head>
    <body>
        <header class="flex">
            <nav class="navbar bg-base-100 shadow p-0.5 flex-wrap">
                <div class="navbar navbar-start">
                    <a href="./index.html" class="titulo ml-5">
                        <div class="flex justify-center items-center">
                            <span class="color-a">Ad</span>
                            <span class="color-b">ri</span>
                            <span class="color-c">an</span>
                            <span class="color-b">ne&nbsp;</span>
                            <span class="color-d">Le</span>
                            <span class="color-e">nk</span>
                            <span class="color-f">er</span>
                        </div>  
                    </a>
                </div>
                <div class="navbar navbar-end">
                    <ul class="menu menu-horizontal">
                        <li><a>Discografia</a></li>
                        <li><a>Galeria</a></li>
                        <li><a>Contacto</a></li>
                    </ul>
                </div>
            </nav>
        </header>
       <main class="bg-hero min-h-screen p-5 relative">
            <div class="absolute inset-0 bg-base-100 opacity-20"></div>
            <div class="relative z-10">

                <div class="flex flex-wrap justify-center gap-4 p-5 rounded">

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/bright_future.jpg" class="rounded" alt="Bright Future">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Bright Future</h2>
                            <span>2024</span>
                        </div>
                    </div>

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/abysskiss.jpg" class="rounded" alt="Abysskiss">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Abysskiss</h2>
                            <span>2018</span>
                        </div>
                    </div>

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/songs.jpg" class="rounded" alt="Songs">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Songs</h2>
                            <span>2020</span>
                        </div>
                    </div>

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/instrumentals.jpg" class="rounded" alt="Instrumentals">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Instrumentals</h2>
                            <span>2020</span>
                        </div>
                    </div>

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/hours_were_the_birds.jpg" class="rounded" alt="Hours Were the Birds">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Hours Were the Birds</h2>
                            <span>2014</span>
                        </div>
                    </div>

                    <div class="card bg-base-200 shadow rounded w-70">
                        <figure class="p-4 pb-0">
                            <img src="./img/albunes/live_at_revolution_hall.jpg" class="rounded" alt="Live at Revolution Hall">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title font-caveat">Live at Revolution Hall</h2>
                            <span>2023</span>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <footer class="footer sm:footer-horizontal footer-center bg-base-300 text-base-content p-4">
            <aside>
                <p>Copyright © 2026 - All right reserved by Kodawarinizu</p>
            </aside>
        </footer>
    </body> 
</html>
